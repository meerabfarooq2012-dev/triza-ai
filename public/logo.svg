<?xml version="1.0" encoding="utf-8"?>
<!-- TRIZA — Self-Built AI logo.
     Neural-network brain motif: a stylised brain silhouette built from
     connected nodes (synapses), emerald on near-black. Matches the
     workspace sidebar accent (bg-emerald-500 on bg-zinc-950). -->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 30 30" style="enable-background:new 0 0 30 30;" xml:space="preserve">
<defs>
  <style type="text/css">
    .st-bg{fill:#0a0a0f;}
    .st-node{fill:#10b981;}
    .st-node-dim{fill:#34d399;}
    .st-line{fill:none;stroke:#10b981;stroke-width:0.7;stroke-linecap:round;stroke-linejoin:round;opacity:0.85;}
    .st-core{fill:#6ee7b7;}

    .t-breathe {
      animation: breathe 3.2s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.78; }
      50% { opacity: 1; }
    }
    .t-pulse {
      animation: pulse 2.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Emerald glow gradient for the core -->
  <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#6ee7b7"/>
    <stop offset="60%" style="stop-color:#10b981"/>
    <stop offset="100%" style="stop-color:#047857"/>
  </radialGradient>
</defs>

<!-- Dark rounded-square background -->
<rect x="1.49" y="1.49" width="27.02" height="27.02" rx="5" ry="5" class="st-bg"/>

<g class="t-breathe">
  <!-- Synapse lines (left hemisphere) -->
  <path d="M 6 11 L 11 8 L 13 12 L 10 16 L 13 20 L 11 23" class="st-line"/>
  <path d="M 11 8 L 15 6 L 19 8" class="st-line"/>
  <path d="M 10 16 L 6 18" class="st-line"/>
  <path d="M 13 12 L 15 14" class="st-line"/>
  <path d="M 13 20 L 15 18" class="st-line"/>

  <!-- Synapse lines (right hemisphere) -->
  <path d="M 24 11 L 19 8 L 17 12 L 20 16 L 17 20 L 19 23" class="st-line"/>
  <path d="M 20 16 L 24 18" class="st-line"/>
  <path d="M 17 12 L 15 14" class="st-line"/>
  <path d="M 17 20 L 15 18" class="st-line"/>

  <!-- Central vertical spine -->
  <path d="M 15 6 L 15 24" class="st-line"/>

  <!-- Outer nodes (synapse endpoints) -->
  <circle cx="6" cy="11" r="0.9" class="st-node"/>
  <circle cx="6" cy="18" r="0.9" class="st-node"/>
  <circle cx="24" cy="11" r="0.9" class="st-node"/>
  <circle cx="24" cy="18" r="0.9" class="st-node"/>
  <circle cx="11" cy="8" r="0.9" class="st-node"/>
  <circle cx="19" cy="8" r="0.9" class="st-node"/>
  <circle cx="11" cy="23" r="0.9" class="st-node"/>
  <circle cx="19" cy="23" r="0.9" class="st-node"/>

  <!-- Inner nodes -->
  <circle cx="13" cy="12" r="0.7" class="st-node-dim"/>
  <circle cx="17" cy="12" r="0.7" class="st-node-dim"/>
  <circle cx="13" cy="20" r="0.7" class="st-node-dim"/>
  <circle cx="17" cy="20" r="0.7" class="st-node-dim"/>
  <circle cx="10" cy="16" r="0.7" class="st-node-dim"/>
  <circle cx="20" cy="16" r="0.7" class="st-node-dim"/>
  <circle cx="15" cy="14" r="0.8" class="st-node-dim"/>
  <circle cx="15" cy="18" r="0.8" class="st-node-dim"/>
</g>

<!-- Glowing core (the "mind") -->
<g class="t-pulse">
  <circle cx="15" cy="15" r="2.1" fill="url(#coreGlow)"/>
  <circle cx="15" cy="15" r="1.1" class="st-core"/>
</g>
</svg>
